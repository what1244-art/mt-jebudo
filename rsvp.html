<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT 참석·입금 현황 (관리자용)</title>
<meta name="robots" content="noindex">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    background:linear-gradient(180deg,#dff1f5,#eaf6f8 50%,#f7f1e2);color:#16323f;min-height:100vh;padding:24px 14px;line-height:1.5;}
  .wrap{max-width:580px;margin:0 auto;}
  h1{font-size:23px;color:#0b3d5c;margin-bottom:4px;}
  .sub{font-size:13px;color:#5a7480;margin-bottom:18px;}
  .stats{display:flex;gap:10px;margin-bottom:18px;}
  .stat{flex:1;background:#fff;border-radius:14px;padding:15px 8px;text-align:center;box-shadow:0 6px 16px rgba(11,61,92,.08);}
  .stat .n{font-size:28px;font-weight:800;}
  .stat .l{font-size:12px;color:#7c93a0;font-weight:700;margin-top:2px;}
  .stat.go .n{color:#1b7fa6;} .stat.pay .n{color:#1f9d6b;} .stat.no .n{color:#b0b8bd;}
  .box{background:#fff;border-radius:16px;box-shadow:0 6px 16px rgba(11,61,92,.08);overflow:hidden;}
  .box h2{font-size:14px;color:#0b3d5c;padding:14px 16px 0;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid #eef3f5;}
  th{background:#eaf6f8;color:#0b3d5c;font-size:12.5px;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;font-size:12px;font-weight:800;border-radius:7px;padding:2px 9px;}
  .b-go{background:#e3f2f7;color:#1b7fa6;} .b-no{background:#f0f1f2;color:#8a9aa1;}
  .tm{color:#9bb0b8;font-size:12px;}
  td.pay{text-align:center;}
  td.pay input{width:21px;height:21px;cursor:pointer;accent-color:#1f9d6b;}
  td.pay.paid::after{content:" 완료";font-size:11px;color:#1f9d6b;font-weight:700;}
  .empty{padding:24px 16px;text-align:center;color:#9bb0b8;font-size:14px;}
  .refresh{font-size:12px;color:#7c93a0;text-align:center;margin-top:14px;}
  tr.is-paid{background:#f3fbf7;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>🙌 MT 참석 · 입금 현황</h1>
    <div class="sub">제부도 MT · 2026.6.27~28 · 관리자용 · 실시간 자동 갱신 · 입금 확인 체크 시 3명 모두 공유</div>
    <div class="stats">
      <div class="stat go"><div class="n" id="n-go">0</div><div class="l">참석</div></div>
      <div class="stat pay"><div class="n" id="n-pay">0</div><div class="l">입금완료</div></div>
      <div class="stat no"><div class="n" id="n-no">0</div><div class="l">불참</div></div>
    </div>
    <div class="box">
      <h2>응답 명단 · 입금 체크</h2>
      <table>
        <thead><tr><th>이름</th><th>여부</th><th>입금</th><th>응답시각</th></tr></thead>
        <tbody id="rows"><tr><td colspan="4" class="empty">아직 응답이 없어요.</td></tr></tbody>
      </table>
    </div>
    <div class="refresh">💚 체크박스를 누르면 입금 확인이 저장돼 3명 모두에게 반영됩니다.</div>
  </div>
<script>
(function(){
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function pad(n){return (n<10?'0':'')+n;}
  function fmt(ts){ if(!ts||!ts.toDate) return ''; var d=ts.toDate(); return pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
  var firebaseConfig = {
    apiKey: "AIzaSyBBthmZzkxRMaYgnIqeoNELuw2JPyxPd84",
    authDomain: "mtgogo-13e6e.firebaseapp.com",
    projectId: "mtgogo-13e6e",
    storageBucket: "mtgogo-13e6e.firebasestorage.app",
    messagingSenderId: "58814941767",
    appId: "1:58814941767:web:768fe9adbb4b5fe7fcff62"
  };
  function load(src,cb){ var s=document.createElement('script'); s.src=src; s.onload=cb; document.head.appendChild(s); }
  load('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js', function(){
    load('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js', function(){
      try{
        firebase.initializeApp(firebaseConfig);
        var db=firebase.firestore();
        window.__togglePay=function(name, checked){
          db.collection('comments').add({topic:'paid', name:name, text: checked?'paid':'unpaid', ts: firebase.firestore.FieldValue.serverTimestamp()})
            .catch(function(e){ alert('저장 실패 — 다시 시도해주세요'); console.error(e); });
        };
        db.collection('comments').orderBy('ts').onSnapshot(function(snap){
          var att={}, when={}, paid={};
          snap.forEach(function(d){ var v=d.data();
            if(v.topic==='rsvp'){ att[v.name]=v.text; when[v.name]=v.ts; }
            else if(v.topic==='paid'){ paid[v.name]=(v.text==='paid'); }
          });
          var names=Object.keys(att);
          var go=0,no=0,pay=0;
          names.forEach(function(n){ if(att[n]==='참석'){ go++; if(paid[n]) pay++; } else no++; });
          document.getElementById('n-go').textContent=go;
          document.getElementById('n-pay').textContent=pay;
          document.getElementById('n-no').textContent=no;
          names.sort(function(a,b){
            if(att[a]!==att[b]) return att[a]==='참석'?-1:1;
            var ta=when[a]&&when[a].toMillis?when[a].toMillis():0, tb=when[b]&&when[b].toMillis?when[b].toMillis():0;
            return tb-ta;
          });
          var rows=document.getElementById('rows');
          if(!names.length){ rows.innerHTML='<tr><td colspan="4" class="empty">아직 응답이 없어요.</td></tr>'; return; }
          rows.innerHTML=names.map(function(n){
            var isGo=att[n]==='참석'; var isPaid=!!paid[n];
            var payCell = isGo
              ? '<td class="pay'+(isPaid?' paid':'')+'"><input type="checkbox" '+(isPaid?'checked':'')+' onchange="__togglePay(\''+esc(n).replace(/\x27/g,"")+'\', this.checked)"></td>'
              : '<td class="pay" style="color:#cfd8dc">-</td>';
            return '<tr class="'+(isPaid?'is-paid':'')+'"><td><b>'+esc(n)+'</b></td><td><span class="badge '+(isGo?'b-go':'b-no')+'">'+(isGo?'참석':'불참')+'</span></td>'+payCell+'<td class="tm">'+fmt(when[n])+'</td></tr>';
          }).join('');
        });
      }catch(e){ console.error(e); }
    });
  });
})();
</script>
</body>
</html>
