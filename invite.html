<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>교육대학원 MT 초대 · 제부도</title>
<meta name="robots" content="noindex">
<meta property="og:type" content="website">
<meta property="og:title" content="교육대학원 MT 초대 · 제부도, 함께 가요">
<meta property="og:description" content="2026.6.27(토)~28(일) 제부도 1박 2일. 참석 여부를 알려주세요!">
<meta property="og:image" content="https://what1244-art.github.io/mt-jebudo/invite-og.png">
<meta property="og:url" content="https://what1244-art.github.io/mt-jebudo/invite.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://what1244-art.github.io/mt-jebudo/invite-og.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    background:linear-gradient(160deg,#0e2a5a 0%,#1f6ea0 45%,#ff9b5e 100%);
    color:#16323f; min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:18px;
  }
  .card{
    width:100%; max-width:430px; background:#fff; border-radius:24px;
    box-shadow:0 18px 50px rgba(8,30,60,.35); overflow:hidden;
  }
  .top{
    background:linear-gradient(135deg,#0b3d5c,#1b7fa6 60%,#3fb8c4);
    color:#fff; padding:24px 24px 20px; text-align:center; position:relative;
  }
  .top .tag{display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.5px;}
  .top h1{font-size:30px;font-weight:800;margin:10px 0 4px;letter-spacing:-.5px;}
  .top .date{font-size:16px;font-weight:700;opacity:.96;}
  .top .sub{font-size:12.5px;opacity:.85;margin-top:3px;}
  .body{padding:18px 22px 22px;}
  .row{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid #eef3f5;}
  .row:last-of-type{border-bottom:none;}
  .row .ic{font-size:19px;width:24px;text-align:center;flex:0 0 24px;line-height:1.4;}
  .row .k{font-size:12px;color:#7c93a0;font-weight:700;}
  .row .v{font-size:15px;font-weight:700;color:#16323f;margin-top:1px;line-height:1.4;}
  .row .v small{font-weight:600;color:#5a7480;font-size:12.5px;}
  .hl{color:#e2502b;}

  .rsvp{margin-top:16px;background:#f3f9fb;border:1px solid #d9eaef;border-radius:16px;padding:16px;}
  .rsvp .q{font-size:15px;font-weight:800;color:#0b3d5c;text-align:center;margin-bottom:11px;}
  .rsvp input{width:100%;border:1px solid #cfe3e8;border-radius:11px;padding:11px 13px;font-size:14.5px;font-family:inherit;margin-bottom:9px;}
  .btns{display:flex;gap:9px;}
  .btns button{flex:1;border:none;border-radius:11px;padding:13px 0;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;}
  .yes{background:#1b7fa6;color:#fff;}
  .yes:hover{background:#156b8c;}
  .yes.sel{background:#0b3d5c;box-shadow:0 0 0 3px rgba(27,127,166,.3);}
  .no{background:#eef3f5;color:#5a7480;}
  .no.sel{background:#d6dee2;box-shadow:0 0 0 3px rgba(120,140,150,.25);}
  .count{text-align:center;font-size:13px;color:#1b7fa6;font-weight:700;margin-top:11px;min-height:18px;}
  .note{text-align:center;font-size:11.5px;color:#9bb0b8;margin-top:9px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#16323f;color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.3s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <span class="tag">🎓 교육대학원 MT 초대</span>
      <h1>제부도, 함께 가요 🌊</h1>
      <div class="date">2026. 6. 27 (토) ~ 6. 28 (일)</div>
      <div class="sub">바다 앞 펜션 · 바베큐 · 불멍 · 폭죽</div>
    </div>
    <div class="body">
      <div class="row"><div class="ic">📍</div><div><div class="k">모이는 곳</div><div class="v">제부도 신성민박펜션 <small>(경기 화성시 서신면 제부리 190-113)</small></div></div></div>
      <div class="row"><div class="ic">⏰</div><div><div class="k">모이는 시각</div><div class="v">27일(토) <span class="hl">12:30까지 입도</span> <small>· 바닷길 만조 전 / 점심은 각자</small></div></div></div>
      <div class="row"><div class="ic">💰</div><div><div class="k">회비</div><div class="v">1인 65,000원 <small>· 숙소·식사·준비물 포함, 남으면 환급</small></div></div></div>
      <div class="row"><div class="ic">🗺️</div><div><div class="k">일정</div><div class="v">조별 미션투어 → 바베큐 만찬 → 불멍·폭죽 <small>/ (일) 해변 아침 후 해산</small></div></div></div>

      <div class="rsvp">
        <div class="q">참석하시나요?</div>
        <input id="name" maxlength="12" placeholder="이름을 입력해주세요" />
        <div class="btns">
          <button class="yes" id="yes">참석합니다 🙌</button>
          <button class="no" id="no">이번엔 어려워요</button>
        </div>
        <div class="count" id="count"></div>
        <div class="note">참석 여부만 눌러주세요 · 자세한 공지는 단톡방에서</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  var toastEl=document.getElementById('toast');
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); setTimeout(function(){toastEl.classList.remove('show');},2600); }
  var nameEl=document.getElementById('name'), yes=document.getElementById('yes'), no=document.getElementById('no'), countEl=document.getElementById('count');

  var firebaseConfig = {
    apiKey: "AIzaSyBBthmZzkxRMaYgnIqeoNELuw2JPyxPd84",
    authDomain: "mtgogo-13e6e.firebaseapp.com",
    projectId: "mtgogo-13e6e",
    storageBucket: "mtgogo-13e6e.firebasestorage.app",
    messagingSenderId: "58814941767",
    appId: "1:58814941767:web:768fe9adbb4b5fe7fcff62"
  };
  function load(src,cb){ var s=document.createElement('script'); s.src=src; s.onload=cb; s.onerror=function(){ countEl.textContent=''; }; document.head.appendChild(s); }

  load('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js', function(){
    load('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js', function(){
      try{
        firebase.initializeApp(firebaseConfig);
        var db=firebase.firestore();
        function send(status, btn){
          var name=(nameEl.value||'').trim();
          if(!name){ toast('이름을 입력해주세요'); nameEl.focus(); return; }
          yes.classList.remove('sel'); no.classList.remove('sel'); btn.classList.add('sel');
          db.collection('comments').add({topic:'rsvp', name:name, text:status, ts:firebase.firestore.FieldValue.serverTimestamp()})
            .then(function(){ toast(status==='참석'?'🙌 참석 신청 완료! 곧 만나요':'알려주셔서 감사해요'); })
            .catch(function(e){ toast('전송 실패 — 잠시 후 다시'); console.error(e); });
        }
        yes.addEventListener('click', function(){ send('참석', yes); });
        no.addEventListener('click', function(){ send('불참', no); });

        db.collection('comments').orderBy('ts').onSnapshot(function(snap){
          var last={};
          snap.forEach(function(d){ var v=d.data(); if(v.topic==='rsvp'){ last[v.name]=v.text; } });
          var n=0; for(var k in last){ if(last[k]==='참석') n++; }
          countEl.textContent = n>0 ? ('🙌 현재 '+n+'명 참석 예정') : '';
        });
      }catch(e){ console.error(e); }
    });
  });
})();
</script>
</body>
</html>
